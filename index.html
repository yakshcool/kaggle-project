<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Continuity Weaver</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-red: #f43f5e;
            --accent-green: #34d399;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        header { margin-bottom: 20px; }
        h1 { margin: 0; font-size: 1.5rem; color: var(--accent-blue); }
        p { margin: 5px 0 0 0; color: var(--text-muted); font-size: 0.9rem; }

        textarea {
            flex: 1;
            background-color: var(--panel-bg);
            border: 1px solid #334155;
            border-radius: 8px;
            color: var(--text-main);
            padding: 15px;
            font-size: 1rem;
            resize: none;
            outline: none;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        button {
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        #analyzeBtn { background-color: var(--accent-blue); color: var(--bg-color); }
        #loreBtn { background-color: var(--accent-green); color: var(--bg-color); }

        .sidebar {
            width: 380px;
            background-color: #0b0f19;
            border-left: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .log-display {
            flex: 1;
            background-color: #020617;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="workspace">
        <header>
            <h1>The Continuity Weaver</h1>
            <p>Draft your scene. Highlight text and click "Add to Lore" to teach the agent new world facts.</p>
        </header>
        
        <textarea id="draftInput" placeholder="Start writing..."></textarea>
        
        <div class="controls">
            <button id="loreBtn" onclick="learnFromSelection()">Add to Lore</button>
            <button id="analyzeBtn" onclick="triggerAgentAnalysis()">Analyze Scene</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="log-display" id="logDisplay">[System] Agent ready.</div>
    </div>

    <script>
        async function learnFromSelection() {
            const selection = window.getSelection().toString();
            if (!selection) return alert("Please highlight the lore fact in your text first!");
            
            const res = await fetch('/add_lore', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ fact: selection })
            });
            document.getElementById('logDisplay').innerHTML += `\n<span style="color:var(--accent-green)">[Lore Updated] Saved: "${selection.substring(0, 20)}..."</span>`;
        }

        async function triggerAgentAnalysis() {
            const draftText = document.getElementById('draftInput').value;
            const log = document.getElementById('logDisplay');
            
            log.innerHTML += `\n[${new Date().toLocaleTimeString()}] Analyzing...`;
            
            const response = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ draft: draftText })
            });
            
            const result = await response.json();
            // Logic to display results...
            log.innerHTML += `\n[System] Analysis complete.`;
        }
    </script>
</body>
</html>
